<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>나의 베이킹 레시피</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<style>
  :root {
    --bg: #faf6f0;
    --card: #ffffff;
    --ink: #3d3229;
    --ink-soft: #8a7d6f;
    --accent: #b0713b;
    --accent-soft: #f3e5d5;
    --line: #eadfd2;
    --shadow: 0 2px 12px rgba(93, 71, 48, 0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 80px; }

  /* ── 헤더 ── */
  header { text-align: center; margin-bottom: 28px; }
  header h1 {
    font-size: 1.9rem;
    letter-spacing: -0.02em;
    font-weight: 800;
  }
  header h1 a { color: var(--ink); text-decoration: none; }
  header p { color: var(--ink-soft); font-size: 0.9rem; margin-top: 4px; }

  /* ── 검색 + 태그 ── */
  .controls { margin-bottom: 24px; }
  .search {
    width: 100%;
    padding: 12px 16px;
    font-size: 1rem;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    background: var(--card);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--ink-soft); }
  .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .tag-chip {
    padding: 5px 13px;
    font-size: 0.85rem;
    border: 1.5px solid var(--line);
    border-radius: 999px;
    background: var(--card);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .tag-chip:hover { border-color: var(--accent); color: var(--accent); }
  .tag-chip.on {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  /* ── 레시피 카드 ── */
  .grid { display: grid; gap: 14px; }
  .card {
    display: block;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px 22px;
    text-decoration: none;
    color: var(--ink);
    box-shadow: var(--shadow);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(93, 71, 48, 0.13);
  }
  .card h2 { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.01em; }
  .card .meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px 12px;
    margin-top: 8px;
    font-size: 0.83rem;
    color: var(--ink-soft);
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 600;
    background: var(--accent-soft);
    color: var(--accent);
  }
  .card .tag-list { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .card .tag-list span {
    font-size: 0.78rem;
    color: var(--ink-soft);
    background: var(--bg);
    padding: 2px 9px;
    border-radius: 999px;
  }
  .empty { text-align: center; color: var(--ink-soft); padding: 60px 0; }

  /* ── 레시피 상세 ── */
  .back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.92rem;
    margin-bottom: 20px;
  }
  .back:hover { text-decoration: underline; }
  article {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 36px 34px;
    box-shadow: var(--shadow);
  }
  article .r-head { border-bottom: 2px solid var(--line); padding-bottom: 20px; margin-bottom: 24px; }
  article .r-head h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.3; }
  article .r-head .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 16px;
    margin-top: 12px;
    font-size: 0.88rem;
    color: var(--ink-soft);
    align-items: center;
  }
  article .r-head .src-link {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  article .r-head .src-link:hover { text-decoration: underline; }

  .r-body h2 {
    font-size: 1.25rem;
    font-weight: 700;
    margin: 28px 0 12px;
    padding-left: 12px;
    border-left: 4px solid var(--accent);
  }
  .r-body h2:first-child { margin-top: 0; }
  .r-body h3 { font-size: 1.05rem; font-weight: 700; margin: 20px 0 8px; color: var(--accent); }
  .r-body p { margin: 10px 0; }
  .r-body ul, .r-body ol { padding-left: 24px; margin: 10px 0; }
  .r-body li { margin: 6px 0; }
  .r-body ol li::marker { font-weight: 700; color: var(--accent); }
  .r-body strong { color: var(--accent); }
  .r-body blockquote {
    margin: 14px 0;
    padding: 12px 18px;
    background: var(--accent-soft);
    border-radius: 10px;
    font-size: 0.92rem;
  }
  .r-body table { border-collapse: collapse; width: 100%; margin: 14px 0; font-size: 0.92rem; }
  .r-body th, .r-body td { border: 1px solid var(--line); padding: 8px 12px; text-align: left; }
  .r-body th { background: var(--bg); }
  .r-body hr { border: none; border-top: 1px solid var(--line); margin: 24px 0; }
  .r-body img { max-width: 100%; border-radius: 12px; }
  .r-body a { color: var(--accent); }

  @media (max-width: 540px) {
    .wrap { padding: 24px 14px 60px; }
    article { padding: 26px 20px; border-radius: 16px; }
    article .r-head h1 { font-size: 1.45rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><a href="#/">🧁 나의 베이킹 레시피</a></h1>
    <p>여기저기서 모은 레시피 노트</p>
  </header>
  <main id="app"><p class="empty">불러오는 중…</p></main>
</div>

<script>
const SOURCE_LABEL = {
  youtube:   { icon: '▶️', name: '유튜브' },
  blog:      { icon: '📝', name: '블로그' },
  instagram: { icon: '📷', name: '인스타그램' },
  other:     { icon: '🔗', name: '기타' },
};

let recipes = [];          // { slug, meta, body }
let activeTag = null;
let query = '';

// ── 프론트매터 파싱 (간단한 YAML 서브셋: key: value, [a, b] 리스트) ──
function parseFrontmatter(text) {
  const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?/);
  if (!m) return { meta: {}, body: text };
  const meta = {};
  for (const line of m[1].split(/\r?\n/)) {
    const kv = line.match(/^([\w_]+):\s*(.*)$/);
    if (!kv) continue;
    let val = kv[2].trim().replace(/^["']|["']$/g, '');
    if (val.startsWith('[') && val.endsWith(']')) {
      val = val.slice(1, -1).split(',').map(s => s.trim().replace(/^["']|["']$/g, '')).filter(Boolean);
    }
    meta[kv[1]] = val;
  }
  return { meta, body: text.slice(m[0].length) };
}

async function load() {
  const res = await fetch('recipes/manifest.json');
  const files = await res.json();
  const results = await Promise.allSettled(files.map(async f => {
    const txt = await (await fetch('recipes/' + encodeURIComponent(f))).text();
    const { meta, body } = parseFrontmatter(txt);
    return { slug: f.replace(/\.md$/, ''), meta, body };
  }));
  recipes = results.filter(r => r.status === 'fulfilled').map(r => r.value);
  recipes.sort((a, b) => (b.meta.date || '').localeCompare(a.meta.date || ''));
  route();
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function sourceBadge(meta) {
  const s = SOURCE_LABEL[meta.source_type] || SOURCE_LABEL.other;
  return `<span class="badge">${s.icon} ${s.name}</span>`;
}

// ── 목록 화면 ──
function renderGrid() {
  const grid = document.querySelector('.grid');
  if (!grid) return;

  const q = query.trim().toLowerCase();
  const shown = recipes.filter(r => {
    const tags = Array.isArray(r.meta.tags) ? r.meta.tags : [];
    if (activeTag && !tags.includes(activeTag)) return false;
    if (!q) return true;
    const hay = [r.meta.title, r.meta.source_name, ...tags].join(' ').toLowerCase();
    return hay.includes(q);
  });

  grid.innerHTML = shown.length ? shown.map(r => `
      <a class="card" href="#/r/${encodeURIComponent(r.slug)}">
        <h2>${esc(r.meta.title || r.slug)}</h2>
        <div class="meta">
          ${sourceBadge(r.meta)}
          ${r.meta.source_name ? `<span>${esc(r.meta.source_name)}</span>` : ''}
          ${r.meta.time ? `<span>⏱ ${esc(r.meta.time)}</span>` : ''}
          ${r.meta.yield ? `<span>🍰 ${esc(r.meta.yield)}</span>` : ''}
        </div>
        ${Array.isArray(r.meta.tags) && r.meta.tags.length
          ? `<div class="tag-list">${r.meta.tags.map(t => `<span>#${esc(t)}</span>`).join('')}</div>` : ''}
      </a>`).join('')
    : `<p class="empty">${recipes.length ? '검색 결과가 없어요.' : '아직 레시피가 없어요. 링크를 AI에게 주고 추가해보세요!'}</p>`;

  document.querySelectorAll('.tag-chip').forEach(btn =>
    btn.classList.toggle('on', btn.dataset.tag === activeTag));
}

function renderList() {
  const app = document.getElementById('app');
  const allTags = [...new Set(recipes.flatMap(r => Array.isArray(r.meta.tags) ? r.meta.tags : []))];

  app.innerHTML = `
    <div class="controls">
      <input class="search" type="search" placeholder="레시피 검색…" value="${esc(query)}">
      ${allTags.length ? `<div class="tags">${allTags.map(t =>
        `<button class="tag-chip${t === activeTag ? ' on' : ''}" data-tag="${esc(t)}">${esc(t)}</button>`
      ).join('')}</div>` : ''}
    </div>
    <div class="grid"></div>`;

  app.querySelector('.search').addEventListener('input', e => {
    query = e.target.value;
    renderGrid();
  });
  app.querySelectorAll('.tag-chip').forEach(btn =>
    btn.addEventListener('click', () => {
      activeTag = activeTag === btn.dataset.tag ? null : btn.dataset.tag;
      renderGrid();
    }));
  renderGrid();
}

// ── 상세 화면 ──
function renderDetail(slug) {
  const app = document.getElementById('app');
  const r = recipes.find(x => x.slug === slug);
  if (!r) {
    app.innerHTML = `<a class="back" href="#/">← 목록으로</a><p class="empty">레시피를 찾을 수 없어요.</p>`;
    return;
  }
  const m = r.meta;
  app.innerHTML = `
    <a class="back" href="#/">← 목록으로</a>
    <article>
      <div class="r-head">
        <h1>${esc(m.title || r.slug)}</h1>
        <div class="meta">
          ${sourceBadge(m)}
          ${m.source_url ? `<a class="src-link" href="${esc(m.source_url)}" target="_blank" rel="noopener">
            ${esc(m.source_name || '원본 보기')} ↗</a>`
            : (m.source_name ? `<span>${esc(m.source_name)}</span>` : '')}
          ${m.time ? `<span>⏱ ${esc(m.time)}</span>` : ''}
          ${m.yield ? `<span>🍰 ${esc(m.yield)}</span>` : ''}
          ${m.date ? `<span>📅 ${esc(m.date)}</span>` : ''}
        </div>
      </div>
      <div class="r-body">${marked.parse(r.body)}</div>
    </article>`;
  window.scrollTo(0, 0);
}

// ── 해시 라우팅 ──
function route() {
  const h = location.hash;
  const m = h.match(/^#\/r\/(.+)$/);
  if (m) renderDetail(decodeURIComponent(m[1]));
  else renderList();
}

window.addEventListener('hashchange', route);
load().catch(() => {
  document.getElementById('app').innerHTML =
    '<p class="empty">레시피 목록을 불러오지 못했어요. recipes/manifest.json을 확인해주세요.</p>';
});
</script>
</body>
</html>
